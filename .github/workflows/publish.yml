name: publish-npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish (defaults to current ref)"
        required: false
        type: string
      dry_run:
        description: "Run a publish dry-run instead of publishing to npm"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: publish-package
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Workflow context
        run: |
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          echo "github.workflow_ref=${{ github.workflow_ref }}"

      - name: Checkout Plugin (Self)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          path: openclaw-memory-libravdb

      - name: Checkout Contracts (Public)
        uses: actions/checkout@v4
        with:
          repository: zephyr-systems/libravdb-contracts
          ref: main
          path: libravdb-contracts

      - name: Verify contracts version alignment
        run: |
          PLUGIN_DECLARED=$(node -p "require('./openclaw-memory-libravdb/package.json').dependencies['@xdarkicex/libravdb-contracts']")
          echo "plugin declares: $PLUGIN_DECLARED"

          LOCKED_VERSION=$(grep -A1 '@xdarkicex/libravdb-contracts@' openclaw-memory-libravdb/pnpm-lock.yaml | grep 'version:' | awk '{print $2}' | tr -d '"' | head -1)
          echo "lockfile resolves to: ${LOCKED_VERSION:-none}"

          if [ -z "${LOCKED_VERSION}" ]; then
            echo ""
            echo "ERROR: Could not resolve @xdarkicex/libravdb-contracts version from lockfile."
            echo "Run: cd openclaw-memory-libravdb && pnpm install"
            exit 1
          fi

          # Verify lockfile resolves to at least the minimum declared version.
          # PLUGIN_DECLARED is a semver range (e.g. ^2.0.12); strip the prefix
          # to get the floor and compare major.minor.patch.
          MIN_EXPECTED=$(echo "$PLUGIN_DECLARED" | sed 's/^[\^~>=<]*//')
          echo "minimum expected: $MIN_EXPECTED"

          node -e "
            const min = '$MIN_EXPECTED'.split('.').map(Number);
            const locked = '$LOCKED_VERSION'.split('.').map(Number);
            const behind = locked[0] < min[0] ||
              (locked[0] === min[0] && locked[1] < min[1]) ||
              (locked[0] === min[0] && locked[1] === min[1] && locked[2] < min[2]);
            if (behind) {
              console.error('ERROR: Lockfile version ' + '$LOCKED_VERSION' + ' is behind declared minimum ' + '$MIN_EXPECTED' + '.');
              console.error('Run: cd openclaw-memory-libravdb && pnpm update @xdarkicex/libravdb-contracts@' + '$PLUGIN_DECLARED');
              process.exit(1);
            }
          " || exit 1
          echo "Contracts version aligned (lockfile $LOCKED_VERSION >= $MIN_EXPECTED)."

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'
          cache-dependency-path: openclaw-memory-libravdb/pnpm-lock.yaml

      - name: Install dependencies
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        working-directory: openclaw-memory-libravdb
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (dry-run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        working-directory: openclaw-memory-libravdb
        run: pnpm install --no-frozen-lockfile

      - name: Install contracts dependencies
        working-directory: libravdb-contracts
        run: pnpm install --frozen-lockfile

      - name: Verify release tag matches package and manifest versions
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: openclaw-memory-libravdb
        run: |
          node -e 'const fs=require("fs"); const pkg=require("./package.json"); const manifest=JSON.parse(fs.readFileSync("./openclaw.plugin.json", "utf8")); const tag=process.env.RELEASE_TAG.replace(/^refs\/tags\/v/,""); if (pkg.version !== tag) { console.error(`package.json version ${pkg.version} does not match release tag ${tag}`); process.exit(1); } if (manifest.version !== tag) { console.error(`openclaw.plugin.json version ${manifest.version} does not match openclaw.plugin.json version ${tag}`); process.exit(1); } if (manifest.version !== pkg.version) { console.error(`openclaw.plugin.json version ${manifest.version} does not match package.json version ${pkg.version}`); process.exit(1); }'
        env:
          RELEASE_TAG: ${{ github.ref }}

      - name: Verify published package contents
        working-directory: openclaw-memory-libravdb
        run: npm pack --dry-run

      - name: Verify npm authentication
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        working-directory: openclaw-memory-libravdb
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry-run publish package
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        working-directory: openclaw-memory-libravdb
        run: npm publish --access public --dry-run

      - name: Publish package
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        working-directory: openclaw-memory-libravdb
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify package is visible on npm
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        working-directory: openclaw-memory-libravdb
        run: npm view @xdarkicex/openclaw-memory-libravdb version
