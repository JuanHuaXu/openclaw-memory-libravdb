name: publish-npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish (defaults to current ref)"
        required: false
        type: string
      dry_run:
        description: "Run a publish dry-run instead of publishing to npm"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    name: publish-package
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Workflow context
        run: |
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          echo "github.workflow_ref=${{ github.workflow_ref }}"

      - name: Checkout Plugin (Self)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          path: openclaw-memory-libravdb

      - name: Checkout Contracts (Public)
        uses: actions/checkout@v4
        with:
          repository: zephyr-systems/libravdb-contracts
          ref: main
          path: libravdb-contracts

      - name: Verify contracts version alignment
        run: |
          CONTRACTS_VERSION=$(node -p "require('./libravdb-contracts/package.json').version")
          PLUGIN_EXPECTED=$(node -p "require('./openclaw-memory-libravdb/package.json').dependencies['@xdarkicex/libravdb-contracts']")
          echo "contracts source version: $CONTRACTS_VERSION"
          echo "plugin expects: $PLUGIN_EXPECTED"

          # Verify the plugin's lockfile resolves to a version >= contracts source.
          # If the lockfile is behind, the plugin ships stale generated types.
          LOCKED_VERSION=$(grep -A1 '@xdarkicex/libravdb-contracts@' openclaw-memory-libravdb/pnpm-lock.yaml | grep 'version:' | awk '{print $2}' | tr -d '"' | head -1)
          echo "lockfile resolves to: ${LOCKED_VERSION:-none}"

          if [ "$LOCKED_VERSION" != "$CONTRACTS_VERSION" ]; then
            echo ""
            echo "ERROR: Lockfile contracts version (${LOCKED_VERSION:-none}) != contracts source (${CONTRACTS_VERSION})."
            echo "Update the plugin to the latest contracts before publishing:"
            echo "  cd openclaw-memory-libravdb"
            echo "  pnpm update @xdarkicex/libravdb-contracts@^${CONTRACTS_VERSION}"
            echo "  git add pnpm-lock.yaml package.json"
            echo "  git commit -m 'deps: bump contracts to v${CONTRACTS_VERSION}'"
            exit 1
          fi
          echo "Contracts version aligned."

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'
          cache-dependency-path: openclaw-memory-libravdb/pnpm-lock.yaml

      - name: Install dependencies
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        working-directory: openclaw-memory-libravdb
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (dry-run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        working-directory: openclaw-memory-libravdb
        run: pnpm install --no-frozen-lockfile

      - name: Install contracts dependencies
        working-directory: libravdb-contracts
        run: pnpm install --frozen-lockfile

      - name: Verify release tag matches package and manifest versions
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: openclaw-memory-libravdb
        run: |
          node -e 'const fs=require("fs"); const pkg=require("./package.json"); const manifest=JSON.parse(fs.readFileSync("./openclaw.plugin.json", "utf8")); const tag=process.env.RELEASE_TAG.replace(/^refs\/tags\/v/,""); if (pkg.version !== tag) { console.error(`package.json version ${pkg.version} does not match release tag ${tag}`); process.exit(1); } if (manifest.version !== tag) { console.error(`openclaw.plugin.json version ${manifest.version} does not match openclaw.plugin.json version ${tag}`); process.exit(1); } if (manifest.version !== pkg.version) { console.error(`openclaw.plugin.json version ${manifest.version} does not match package.json version ${pkg.version}`); process.exit(1); }'
        env:
          RELEASE_TAG: ${{ github.ref }}

      - name: Verify published package contents
        working-directory: openclaw-memory-libravdb
        run: npm pack --dry-run

      - name: Verify npm authentication
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        working-directory: openclaw-memory-libravdb
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry-run publish package
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        working-directory: openclaw-memory-libravdb
        run: npm publish --access public --dry-run

      - name: Publish package
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        working-directory: openclaw-memory-libravdb
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify package is visible on npm
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true'
        working-directory: openclaw-memory-libravdb
        run: npm view @xdarkicex/openclaw-memory-libravdb version
